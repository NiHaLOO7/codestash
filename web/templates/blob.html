{{define "content"}}
<div class="container-xl">
    <div class="repohead">
        <div class="repohead-name">
            <span class="owner">codestash</span>
            <span class="slash">/</span>
            <a class="repo" href="/{{.Repo}}">{{.Repo}}</a>
        </div>
    </div>

    <div class="file-navigation">
        <div class="branch-select">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/></svg>
            {{.Branch}}
        </div>
        <div class="breadcrumb" style="margin-left: 12px;">
            <a href="/{{.Repo}}">{{.Repo}}</a>
            {{range .PathParts}}
            <span class="separator">/</span>
            <a href="/{{$.Repo}}/tree/{{$.Branch}}/{{.Path}}">{{.Name}}</a>
            {{end}}
            <span class="separator">/</span>
            <strong>{{.FileName}}</strong>
        </div>
    </div>

    <div class="blob-header">
        <div class="file-info">
            <span>{{.LineCount}} lines</span>
        </div>
        <div class="file-actions" style="display: flex; gap: 8px;">
            <a href="/{{.Repo}}/edit/{{.Branch}}/{{.FilePath}}" class="btn btn-sm">Edit</a>
            <button class="btn btn-sm">Raw</button>
        </div>
    </div>
    <div class="blob-code-wrapper">
        <table>
            {{range .Lines}}
            <tr>
                <td class="blob-num" id="L{{.Num}}">{{.Num}}</td>
                <td class="blob-code">{{.Content}}</td>
            </tr>
            {{end}}
        </table>
    </div>
</div>
{{end}}
