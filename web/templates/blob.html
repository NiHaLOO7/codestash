{{define "content"}}
<div class="page-header">
    <div>
        <div class="breadcrumb" style="margin-bottom:8px;">
            <a href="/{{.Repo}}">{{.Repo}}</a>
            {{range .PathParts}}
            <span class="sep">/</span>
            <a href="/{{$.Repo}}/tree/{{$.Branch}}/{{.Path}}">{{.Name}}</a>
            {{end}}
            <span class="sep">/</span>
            <span class="current">{{.FileName}}</span>
        </div>
        <h1 style="font-size:20px;">{{.FileName}}</h1>
    </div>
    <div style="display:flex;gap:8px;">
        <a href="/{{.Repo}}/edit/{{.Branch}}/{{.FilePath}}" class="btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 012.474 0l1.086 1.086a1.75 1.75 0 010 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 01-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61z"/></svg>
            Edit
        </a>
        <a href="#" class="btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0113.25 16h-9.5A1.75 1.75 0 012 14.25V1.75z"/></svg>
            Raw
        </a>
        <a href="#" class="btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
            Copy
        </a>
        <a href="#" class="btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2H3v1h1V2zm4.5 0h-1v1h1V2zm3.5 0h-1v1h1V2zM2 5.5V4h1v1.5H2zm0 3V7h1v1.5H2zm0 3V10h1v1.5H2zm0 2V13h1v1H2.5a.5.5 0 01-.5-.5zm11-8V4h1v1.5h-1zm0 3V7h1v1.5h-1zm0 3V10h1v1.5h-1zm0 2V13h-1v1h1.5a.5.5 0 00.5-.5v-.5h-1zM5 14v-1h1v1H5zm3.5 0v-1h1v1h-1zm3.5 0v-1h-1v1h1zM2.5 2H2v.5a.5.5 0 00.5.5H4V2H2.5zM13 2h.5a.5.5 0 01.5.5V4h-1V2z"/></svg>
            Blame
        </a>
    </div>
</div>

<div class="code-viewer">
    <div class="code-header">
        <div class="file-info">{{.LineCount}} lines</div>
        <div class="branch-selector" style="border:none;padding:0;">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/></svg>
            <span style="font-size:12px;color:var(--text-secondary);">{{.Branch}}</span>
        </div>
    </div>
    <div class="code-body">
        <table>
            {{range .Lines}}
            <tr>
                <td class="line-num">{{.Num}}</td>
                <td class="line-code">{{.Content}}</td>
            </tr>
            {{end}}
        </table>
    </div>
</div>
{{end}}
