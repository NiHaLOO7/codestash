{{define "content"}}
<div class="page-header">
    <div>
        <div class="breadcrumb" style="margin-bottom:8px;">
            <a href="/{{.Repo}}">{{.Repo}}</a>
            <span class="sep">/</span>
            <a href="/{{.Repo}}/issues">Issues</a>
            <span class="sep">/</span>
            <span class="current">New</span>
        </div>
        <h1>New Issue</h1>
    </div>
</div>

<div class="issue-form-layout">
    <div class="issue-form-main">
        <div class="card">
            <div class="card-body">
                <div class="form-group">
                    <input type="text" class="form-input form-input-title" placeholder="Title" required>
                </div>
                <div class="form-group">
                    <div class="editor-toolbar">
                        <button type="button" class="editor-btn" title="Bold (Ctrl+B)">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h4.5a3.501 3.501 0 012.852 5.53A3.499 3.499 0 019.5 14H4a1 1 0 01-1-1V3a1 1 0 011-1zm1 7v3h4.5a1.5 1.5 0 000-3H5zm3.5-2a1.5 1.5 0 000-3H5v3h3.5z"/></svg>
                        </button>
                        <button type="button" class="editor-btn" title="Italic (Ctrl+I)">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6 2.75A.75.75 0 016.75 2h6.5a.75.75 0 010 1.5h-2.505l-3.858 9H9.25a.75.75 0 010 1.5h-6.5a.75.75 0 010-1.5h2.505l3.858-9H6.75A.75.75 0 016 2.75z"/></svg>
                        </button>
                        <button type="button" class="editor-btn" title="Code">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.72 3.22a.75.75 0 011.06 1.06L2.06 8l3.72 3.72a.75.75 0 11-1.06 1.06L.22 8.53a.75.75 0 010-1.06l4.5-4.25zm6.56 0a.75.75 0 10-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 101.06 1.06l4.5-4.25a.75.75 0 000-1.06l-4.5-4.25z"/></svg>
                        </button>
                        <button type="button" class="editor-btn" title="Link">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/></svg>
                        </button>
                        <span class="editor-sep"></span>
                        <button type="button" class="editor-btn" title="Numbered list">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.003 2.5a.5.5 0 00-.723-.447l-1.003.5a.5.5 0 00.446.895l.28-.14V6H.5a.5.5 0 000 1h2.006a.5.5 0 000-1h-.503V2.5zM5 3.25a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5A.75.75 0 015 3.25zm0 5a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5A.75.75 0 015 8.25zm0 5a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5a.75.75 0 01-.75-.75z"/></svg>
                        </button>
                        <button type="button" class="editor-btn" title="Task list">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 1.75v11.5c0 .138.112.25.25.25h10.5a.25.25 0 00.25-.25V1.75a.25.25 0 00-.25-.25H2.75a.25.25 0 00-.25.25zm10.75-1.5H2.75A1.75 1.75 0 001 1.75v11.5c0 .966.784 1.75 1.75 1.75h10.5A1.75 1.75 0 0015 13.25V1.75A1.75 1.75 0 0013.25.25zM7 9.75a.75.75 0 01-.75.75h-1.5a.75.75 0 01-.75-.75v-1.5A.75.75 0 014.75 7.5h1.5a.75.75 0 01.75.75v1.5zm4.75.75h-2.5a.75.75 0 010-1.5h2.5a.75.75 0 010 1.5zm-8 3h1.5a.75.75 0 01.75.75v-.003a.747.747 0 01-.75.753h-1.5a.75.75 0 01-.75-.75V14a.75.75 0 01.75-.75zm6.5.75h-2.5a.75.75 0 010-1.5h2.5a.75.75 0 010 1.5z"/></svg>
                        </button>
                        <button type="button" class="editor-btn" title="Mention">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.243 4.757a3.757 3.757 0 115.851 3.119 6.006 6.006 0 013.9 5.339.75.75 0 01-1.49.175 4.505 4.505 0 00-8.914 0 .75.75 0 11-1.49-.175 6.006 6.006 0 013.9-5.339 3.753 3.753 0 01-1.757-3.12z"/></svg>
                        </button>
                        <span class="editor-sep"></span>
                        <button type="button" class="editor-btn">Preview</button>
                    </div>
                    <textarea class="form-input form-input-editor" placeholder="Leave a comment&#10;&#10;Supports Markdown: **bold**, _italic_, `code`, [links](url), - lists, > quotes" rows="12"></textarea>
                    <p class="form-hint" style="margin-top:6px;">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="display:inline;vertical-align:middle;margin-right:3px;"><path d="M14.85 3H1.15C.52 3 0 3.52 0 4.15v7.69C0 12.48.52 13 1.15 13h13.69c.64 0 1.15-.52 1.15-1.15v-7.7C16 3.52 15.48 3 14.85 3zM9 11H7V8L5.5 9.92 4 8v3H2V5h2l1.5 2L7 5h2v6zm2.99.5L9.5 8H11V5h2v3h1.5l-2.51 3.5z"/></svg>
                        Styling with Markdown is supported
                    </p>
                </div>
            </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px;">
            <button type="submit" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/></svg>
                Submit new issue
            </button>
            <a href="/{{.Repo}}/issues" class="btn">Cancel</a>
        </div>
    </div>
    <div class="issue-form-sidebar">
        <div class="sidebar-widget">
            <div class="widget-header">Assignees</div>
            <div class="widget-body">
                <a href="#" class="widget-link">No one — assign yourself</a>
            </div>
        </div>
        <div class="sidebar-widget">
            <div class="widget-header">Labels</div>
            <div class="widget-body">
                <a href="#" class="widget-link">None yet</a>
            </div>
        </div>
        <div class="sidebar-widget">
            <div class="widget-header">Milestone</div>
            <div class="widget-body">
                <a href="#" class="widget-link">No milestone</a>
            </div>
        </div>
    </div>
</div>
{{end}}
