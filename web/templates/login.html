{{define "content"}}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo">CS</div>
            <h1>Sign in to CodeStash</h1>
            <p style="color:var(--text-secondary);font-size:13px;margin-top:6px;">Secure access to your repositories</p>
        </div>
        {{if .Error}}
        <div class="auth-error">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0114.082 15H1.918a1.75 1.75 0 01-1.543-2.575L6.457 1.047zM8 5a.75.75 0 00-.75.75v2.5a.75.75 0 001.5 0v-2.5A.75.75 0 008 5zm0 9a1 1 0 100-2 1 1 0 000 2z"/></svg>
            {{.Error}}
        </div>
        {{end}}
        <div class="auth-form">
            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-icon-wrapper">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="input-icon"><path d="M10.561 8.073a6.005 6.005 0 013.432 5.142.75.75 0 11-1.498.07 4.5 4.5 0 00-8.99 0 .75.75 0 11-1.498-.07 6.004 6.004 0 013.431-5.142 3.999 3.999 0 115.123 0zM10.5 5a2.5 2.5 0 10-5 0 2.5 2.5 0 005 0z"/></svg>
                        <input type="text" name="username" class="form-input form-input-icon" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label style="display:flex;justify-content:space-between;align-items:center;">
                        Password
                        <a href="#" style="font-size:11px;font-weight:400;">Forgot password?</a>
                    </label>
                    <div class="input-icon-wrapper">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="input-icon"><path d="M4 4v2h-.25A1.75 1.75 0 002 7.75v5.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0014 13.25v-5.5A1.75 1.75 0 0012.25 6H12V4a4 4 0 10-8 0zm6.5 2V4a2.5 2.5 0 00-5 0v2h5zM8 9.5a1.5 1.5 0 01.75 2.8v.95a.75.75 0 01-1.5 0v-.95A1.5 1.5 0 018 9.5z"/></svg>
                        <input type="password" name="password" class="form-input form-input-icon" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4v2h-.25A1.75 1.75 0 002 7.75v5.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0014 13.25v-5.5A1.75 1.75 0 0012.25 6H12V4a4 4 0 10-8 0zm6.5 2V4a2.5 2.5 0 00-5 0v2h5zM8 9.5a1.5 1.5 0 01.75 2.8v.95a.75.75 0 01-1.5 0v-.95A1.5 1.5 0 018 9.5z"/></svg>
                    Sign In Securely
                </button>
            </form>
        </div>
        <div class="auth-security-info">
            <div class="security-badge">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8.533.133a1.75 1.75 0 00-1.066 0l-5.25 1.68A1.75 1.75 0 001 3.48V7c0 1.566.32 3.182 1.303 4.682.983 1.498 2.585 2.813 5.032 3.855a1.7 1.7 0 001.33 0c2.447-1.042 4.049-2.357 5.032-3.855C14.68 10.182 15 8.566 15 7V3.48a1.75 1.75 0 00-1.217-1.667L8.533.133zm-.61 1.429a.25.25 0 01.153 0l5.25 1.68a.25.25 0 01.174.238V7c0 1.358-.275 2.666-1.057 3.86-.784 1.194-2.121 2.34-4.366 3.297a.2.2 0 01-.154 0c-2.245-.956-3.582-2.104-4.366-3.298C2.775 9.666 2.5 8.36 2.5 7V3.48a.25.25 0 01.174-.238l5.25-1.68zM11.28 6.28a.75.75 0 00-1.06-1.06L7.25 8.19l-.97-.97a.75.75 0 10-1.06 1.06l1.5 1.5a.75.75 0 001.06 0l3.5-3.5z"/></svg>
                <span>Protected by bcrypt encryption</span>
            </div>
            <div class="security-badge">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4v2h-.25A1.75 1.75 0 002 7.75v5.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0014 13.25v-5.5A1.75 1.75 0 0012.25 6H12V4a4 4 0 10-8 0zm6.5 2V4a2.5 2.5 0 00-5 0v2h5zM8 9.5a1.5 1.5 0 01.75 2.8v.95a.75.75 0 01-1.5 0v-.95A1.5 1.5 0 018 9.5z"/></svg>
                <span>HttpOnly secure sessions (24h)</span>
            </div>
        </div>
        <div class="auth-footer">
            New to CodeStash? <a href="/signup">Create an account</a>
        </div>
    </div>
</div>
{{end}}
