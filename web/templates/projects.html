{{define "content"}}
<div class="page-header">
    <div>
        <h1>Projects</h1>
        <p class="subtitle">Plan and track work with project boards</p>
    </div>
    <a href="#" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>

<div class="projects-page">

    <div class="kanban-board">
        <div class="kanban-column">
            <div class="kanban-column-header">
                <div class="kanban-column-title">
                    <span class="kanban-dot" style="background:#6e7681;"></span>
                    Todo
                </div>
                <span class="kanban-count">0</span>
            </div>
            <div class="kanban-cards">
                <div class="kanban-empty">
                    <p>No items</p>
                </div>
            </div>
            <button class="kanban-add-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
                Add item
            </button>
        </div>

        <div class="kanban-column">
            <div class="kanban-column-header">
                <div class="kanban-column-title">
                    <span class="kanban-dot" style="background:#d29922;"></span>
                    In Progress
                </div>
                <span class="kanban-count">0</span>
            </div>
            <div class="kanban-cards">
                <div class="kanban-empty">
                    <p>No items</p>
                </div>
            </div>
            <button class="kanban-add-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
                Add item

        <div class="kanban-column">
            <div class="kanban-column-header">
                <div class="kanban-column-title">
                    <span class="kanban-dot" style="background:#3fb950;"></span>
                    Done
                </div>
                <span class="kanban-count">0</span>
            </div>
            <div class="kanban-cards">
                <div class="kanban-empty">
                    <p>No items</p>
                </div>
            </div>
            <button class="kanban-add-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
                Add item
            </button>
        </div>
    </div>
</div>
{{end}}
