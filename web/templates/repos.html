{{define "content"}}
<div class="container-xl">
    <div class="dashboard-header">
        <h2>Repositories</h2>
        <a href="/new" class="btn btn-primary">New Repository</a>
    </div>
    {{range .Repos}}
    <div class="repo-list-item">
        <h3><a href="/{{.Name}}">{{.Name}}</a></h3>
        <p class="repo-desc">Self-hosted repository</p>
        <div class="repo-meta">
            <span>
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/>
                </svg>
                {{.Branch}}
            </span>
        </div>
    </div>
    {{end}}
    {{if not .Repos}}
    <div style="text-align: center; padding: 64px 0; color: #656d76;">
        <p style="font-size: 20px; margin-bottom: 8px;">No repositories yet</p>
        <p>Create your first repository to get started.</p>
        <a href="/new" class="btn btn-primary" style="margin-top: 16px;">Create Repository</a>
    </div>
    {{end}}
</div>
{{end}}
